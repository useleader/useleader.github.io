name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault (warm-fire)
        uses: actions/checkout@v4
        with:
          repository: useleader/warm-fire
          token: ${{ secrets.GITHUB_TOKEN }}
          path: vault
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Quartz
        run: npm install -g quartz
      - name: Build Quartz
        run: quartz build --repository useleader/warm-fire
        working-directory: ./vault
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./vault/public
          destination_dir: useleader.github.io
